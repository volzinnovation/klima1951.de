# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate status payload
        run: |
          python -m json.tool frontend/data-status.json >/dev/null
          python etl/data_status.py --format json --public --require-fresh > /tmp/data-status.generated.json
          python - <<'PY'
          import json

          with open("frontend/data-status.json", encoding="utf-8") as handle:
              payload = json.load(handle)

          freshness = payload.get("freshness") or {}
          required = {
              "expected_latest_complete_year",
              "stats_latest_complete_year",
              "hyras_latest_complete_year",
              "status",
          }
          missing = sorted(required - set(freshness))
          if missing:
              raise SystemExit(f"Missing freshness fields: {', '.join(missing)}")
          if freshness["status"] != "ok":
              raise SystemExit(f"Published freshness is not OK: {freshness['status']}")
          PY
          test -f frontend/status.html
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository
          path: 'frontend'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
